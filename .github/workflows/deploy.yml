name: CD - Deploy to Firebase

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Deploy to Staging
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        working-directory: frontend
        run: firebase deploy --only firestore:rules --project ${{ vars.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

      # Cloud Functions deploy requires Blaze plan - uncomment when upgraded
      # - name: Install Functions dependencies
      #   working-directory: frontend/functions
      #   run: npm ci
      # - name: Deploy Cloud Functions
      #   working-directory: frontend
      #   run: firebase deploy --only functions --project ${{ vars.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Frontend Hosting
        working-directory: frontend
        run: firebase deploy --only hosting --project ${{ vars.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment summary
        run: |
          echo "### Staging Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** ${{ vars.FIREBASE_PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # Deploy to Production (requires manual approval)
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        working-directory: frontend
        run: firebase deploy --only firestore:rules --project ${{ vars.FIREBASE_PROJECT_ID_PROD }} --token ${{ secrets.FIREBASE_TOKEN_PROD }}

      # Cloud Functions deploy requires Blaze plan - uncomment when upgraded
      # - name: Install Functions dependencies
      #   working-directory: frontend/functions
      #   run: npm ci
      # - name: Deploy Cloud Functions
      #   working-directory: frontend
      #   run: firebase deploy --only functions --project ${{ vars.FIREBASE_PROJECT_ID_PROD }} --token ${{ secrets.FIREBASE_TOKEN_PROD }}

      - name: Deploy Frontend Hosting
        working-directory: frontend
        run: firebase deploy --only hosting --project ${{ vars.FIREBASE_PROJECT_ID_PROD }} --token ${{ secrets.FIREBASE_TOKEN_PROD }}

      - name: Deployment summary
        run: |
          echo "### Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** ${{ vars.FIREBASE_PROJECT_ID_PROD }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
