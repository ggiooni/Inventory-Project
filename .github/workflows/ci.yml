name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Detect which services changed
  # ──────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ──────────────────────────────────────────────
  # Backend: Lint + Test (parallel)
  # ──────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 7

  # ──────────────────────────────────────────────
  # Frontend: Lint + Test (parallel)
  # ──────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  # ──────────────────────────────────────────────
  # Security: Dependency audit
  # ──────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true
        id: audit-backend
      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
        id: audit-frontend
      - name: Report audit results
        if: steps.audit-backend.outcome == 'failure' || steps.audit-frontend.outcome == 'failure'
        run: |
          echo "::warning::Security vulnerabilities found - review npm audit output above"

  # ──────────────────────────────────────────────
  # Gate: All required checks must pass
  # ──────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, lint-backend, test-backend, lint-frontend, test-frontend, security-audit]
    steps:
      - name: Verify results
        run: |
          echo "Backend changed: ${{ needs.changes.outputs.backend }}"
          echo "Frontend changed: ${{ needs.changes.outputs.frontend }}"

          # Check backend (required only if changed)
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            if [ "${{ needs.lint-backend.result }}" != "success" ]; then
              echo "::error::Backend lint failed"
              exit 1
            fi
            if [ "${{ needs.test-backend.result }}" != "success" ]; then
              echo "::error::Backend tests failed"
              exit 1
            fi
          fi

          # Check frontend (required only if changed)
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            if [ "${{ needs.lint-frontend.result }}" != "success" ]; then
              echo "::error::Frontend lint failed"
              exit 1
            fi
            if [ "${{ needs.test-frontend.result }}" != "success" ]; then
              echo "::error::Frontend tests failed"
              exit 1
            fi
          fi

          echo "All CI checks passed!"
